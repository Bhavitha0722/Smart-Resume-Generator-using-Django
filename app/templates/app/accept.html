<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <title>Resume Builder</title>

</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow p-5">

                <h1 class="text-center mb-4">
                    Resume Builder
                </h1>

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text"
                               name="name"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email"
                               name="email"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Phone</label>
                        <input type="text"
                               name="phone"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Address</label>
                        <textarea name="address"
                                  class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>LinkedIn</label>
                        <input type="text"
                               name="linkedin"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>GitHub</label>
                        <input type="text"
                               name="github"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Career Objective</label>
                        <textarea name="objective"
                                  class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Degree</label>
                        <input type="text"
                               name="degree"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>College</label>
                        <input type="text"
                               name="college"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>University</label>
                        <input type="text"
                               name="university"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>CGPA</label>
                        <input type="text"
                               name="cgpa"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Passing Year</label>
                        <input type="text"
                               name="passing_year"
                               class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Skills</label>
                        <textarea name="skills"
                                  class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Projects</label>
                        <textarea name="projects"
                                  class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Experience</label>
                        <textarea name="experience"
                                  class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Certifications</label>
                        <textarea name="certifications"
                                  class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Achievements</label>
                        <textarea name="achievements"
                                  class="form-control"></textarea>
                    </div>

                    <div class="mb-3">
                        <label>Languages</label>
                        <input type="text"
                               name="languages"
                               class="form-control">
                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100">

                        Generate Resume

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>

</html>
